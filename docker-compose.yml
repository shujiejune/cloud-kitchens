services:

  # ─────────────── Infrastructure ───────────────

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-yourpassword}
      MYSQL_DATABASE: ${DB_NAME:-cloudkitchens_db}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─────────────── Spring Cloud core ───────────────

  config-server:
    build: ./config-server
    ports:
      - "8888:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=native
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s

  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s

  # ─────────────── Application services ───────────────

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_URL=http://eureka-server:8761
      - REDIS_HOST=redis
      - JWT_SECRET=${JWT_SECRET:-your-256-bit-secret-key-for-validating-tokens}
      - ZIPKIN_URL=http://zipkin:9411
    depends_on:
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_healthy

  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_URL=http://eureka-server:8761
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-cloudkitchens_db}
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD:-yourpassword}
      - REDIS_HOST=redis
      - JWT_SECRET=${JWT_SECRET:-your-256-bit-secret-key-for-validating-tokens}
      - ZIPKIN_URL=http://zipkin:9411
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  catalog-service:
    build: ./catalog-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_URL=http://eureka-server:8761
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-cloudkitchens_db}
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD:-yourpassword}
      - ZIPKIN_URL=http://zipkin:9411
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  procurement-service:
    build: ./procurement-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_URL=http://eureka-server:8761
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-cloudkitchens_db}
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD:-yourpassword}
      - MONGO_URI=mongodb://mongodb:27017/cloudkitchens_procurement
      - ZIPKIN_URL=http://zipkin:9411
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  orders-service:
    build: ./orders-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_URL=http://eureka-server:8761
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-cloudkitchens_db}
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD:-yourpassword}
      - ZIPKIN_URL=http://zipkin:9411
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

volumes:
  mysql-data:
  mongo-data:
