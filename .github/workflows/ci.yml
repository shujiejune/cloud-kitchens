name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: cloudkitchens_db
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval \"db.adminCommand('ping')\""
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and run tests
        run: ./mvnw clean verify
        env:
          DB_HOST: localhost
          DB_PORT: 3307
          DB_NAME: cloudkitchens_db
          DB_USERNAME: root
          DB_PASSWORD: testpassword
          REDIS_HOST: localhost
          MONGO_URI: mongodb://localhost:27017/cloudkitchens_procurement
          JWT_SECRET: test-256-bit-secret-key-for-validating-tokens-ci

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: '**/target/surefire-reports/'
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Maven packages (skip tests)
        run: ./mvnw -DskipTests clean package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        run: |
          REPO="ghcr.io/${{ github.repository_owner }}/cloudkitchens"
          SHA="${{ github.sha }}"
          for service in config-server eureka-server api-gateway auth-service catalog-service procurement-service orders-service; do
            docker build -t "${REPO}/${service}:latest" \
                         -t "${REPO}/${service}:${SHA}" \
                         "./${service}"
            docker push "${REPO}/${service}:latest"
            docker push "${REPO}/${service}:${SHA}"
          done
