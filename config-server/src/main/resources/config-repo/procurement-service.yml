server:
  port: 8083

spring:
  application:
    name: procurement-service
  datasource:
    url: jdbc:mysql://localhost:3307/cloudkitchens_db?useSSL=false
    username: root
    password: yourpassword
  jpa:
    hibernate:
      ddl-auto: update
  data:
    mongodb:
      uri: mongodb://localhost:27017/cloudkitchens_procurement

# Resilience4j Circuit Breaker Config for Feign Clients
resilience4j:
  circuitbreaker:
    instances:
      amazonClient:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30000ms # 30 seconds
        permittedNumberOfCallsInHalfOpenState: 2
      walmartClient:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30000ms
      krogerClient:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30000ms

# Vendor API base URLs — referenced by @FeignClient(url=...) in VendorApiClients.
# TODO: replace these PLACEHOLDER hostnames with the real vendor endpoints
#       (or per-environment URLs via Spring profiles) before hitting prod.
vendor:
  amazon:
    api-base-url: https://api.amazon.example.com    # PLACEHOLDER
  walmart:
    api-base-url: https://api.walmart.example.com   # PLACEHOLDER
  kroger:
    api-base-url: https://api.kroger.example.com    # PLACEHOLDER

# Procurement-service tuning knobs
procurement:
  optimizer:
    # Consolidation sweep: move a line from its cheapest single-item vendor
    # to a vendor already used elsewhere in the plan when the per-item cost
    # delta is strictly below this threshold.  Reduces invoice count without
    # materially raising total cost.
    consolidation-threshold: 5.00
  vendor-call:
    # Max wait for a vendor rate-limit permit before the call is treated as
    # a vendor failure (circuit breaker records a failure).
    acquire-timeout-ms: 2000