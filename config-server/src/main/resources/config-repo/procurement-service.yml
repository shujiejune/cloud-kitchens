server:
  port: 8083

spring:
  application:
    name: procurement-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:cloudkitchens_db}?useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:yourpassword}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    table: flyway_schema_history_procurement
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/cloudkitchens_procurement}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
        producer:
          key-serializer: org.apache.kafka.common.serialization.StringSerializer
          value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
          acks: all
          retries: 3
          properties:
            spring.json.add.type.headers: false
        consumer:
          group-id: procurement-service
          key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
          value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
          auto-offset-reset: earliest
          enable-auto-commit: false
          properties:
            spring.json.trusted.packages: org.example.procurementservice.event
            spring.json.use.type.headers: false
        listener:
          ack-mode: RECORD

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761}/eureka/


kafka:
  topics:
    price-fetch-requests:
      name: price-fetch-requests
      partitions: 6
      replicas: 1
    sub-order-dispatch:
      name: sub-order-dispatch
      partitions: 12
      replicas: 1

# Resilience4j Circuit Breaker Config for vendor Feign clients
resilience4j:
  circuitbreaker:
    instances:
      amazonClient:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30000ms
        permittedNumberOfCallsInHalfOpenState: 2
      walmartClient:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30000ms
        permittedNumberOfCallsInHalfOpenState: 2
      krogerClient:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30000ms
        permittedNumberOfCallsInHalfOpenState: 2

# Vendor API base URLs — replace PLACEHOLDER values with real endpoints before going to prod
vendor:
  amazon:
    api-base-url: ${VENDOR_AMAZON_URL:https://api.amazon.example.com}
  walmart:
    api-base-url: ${VENDOR_WALMART_URL:https://api.walmart.example.com}
  kroger:
    api-base-url: ${VENDOR_KROGER_URL:https://api.kroger.example.com}

# Procurement-service tuning knobs
procurement:
  optimizer:
    consolidation-threshold: ${CONSOLIDATION_THRESHOLD:5.00}
  vendor-call:
    acquire-timeout-ms: ${VENDOR_ACQUIRE_TIMEOUT_MS:2000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 0.5
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411}/api/v2/spans

logging:
  level:
    org.example.procurementservice: DEBUG
