server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/v1/auth/**
        - id: catalog-service
          uri: lb://CATALOG-SERVICE
          predicates:
            - Path=/api/v1/catalog/**
        - id: procurement-service
          uri: lb://PROCUREMENT-SERVICE
          predicates:
            - Path=/api/v1/procurement/**
        - id: orders-service
          uri: lb://ORDERS-SERVICE
          predicates:
            - Path=/api/v1/orders/**
        - id: orders-analytics
          uri: lb://ORDERS-SERVICE
          predicates:
            - Path=/api/v1/analytics/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: when-authorized

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.example.apigateway: DEBUG

jwt:
  secret: your-256-bit-secret-key-for-validating-tokens