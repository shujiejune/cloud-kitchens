server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native # Tells the server to read from local files, not Git
  cloud:
    config:
      server:
        native:
          # Points to the folder you created in the classpath
          search-locations: classpath:/config-repo/

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/